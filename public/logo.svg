<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" role="img" aria-label="Your Logo">
  <defs>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Mark -->
  <g transform="translate(8, 12)">
    <!-- Rounded square badge -->
    <rect x="0" y="0" width="96" height="96" rx="20" fill="url(#ringGrad)"/>
    <rect x="6" y="6" width="84" height="84" rx="15" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
    <!-- Lightning bolt -->
    <path d="M55 14 L26 56 H44 L38 84 L70 38 H52 Z"
          fill="url(#boltGrad)"
          stroke="#0f172a"
          stroke-width="2"
          stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(124, 0)" font-family="Montserrat, Segoe UI, system-ui, sans-serif">
    <text x="0" y="58" font-size="32" font-weight="900" fill="#0f172a" letter-spacing="2">YOUR LOGO</text>
    <text x="2" y="84" font-size="11" font-weight="700" fill="#1d4ed8" letter-spacing="4">ELECTRICAL CONTRACTOR</text>
    <line x1="2" y1="94" x2="180" y2="94" stroke="#facc15" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
