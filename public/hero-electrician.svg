<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Electrician at work illustration">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="boltY" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#facc15" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#1d4ed8" stop-opacity="0.0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#sky)"/>
  <rect width="800" height="600" fill="url(#glow)"/>

  <!-- Dot grid -->
  <g fill="#ffffff" opacity="0.06">
    <circle cx="40" cy="40" r="1.5"/><circle cx="120" cy="40" r="1.5"/><circle cx="200" cy="40" r="1.5"/><circle cx="280" cy="40" r="1.5"/><circle cx="360" cy="40" r="1.5"/><circle cx="440" cy="40" r="1.5"/><circle cx="520" cy="40" r="1.5"/><circle cx="600" cy="40" r="1.5"/><circle cx="680" cy="40" r="1.5"/><circle cx="760" cy="40" r="1.5"/>
    <circle cx="40" cy="120" r="1.5"/><circle cx="120" cy="120" r="1.5"/><circle cx="200" cy="120" r="1.5"/><circle cx="280" cy="120" r="1.5"/><circle cx="360" cy="120" r="1.5"/><circle cx="440" cy="120" r="1.5"/><circle cx="520" cy="120" r="1.5"/><circle cx="600" cy="120" r="1.5"/><circle cx="680" cy="120" r="1.5"/><circle cx="760" cy="120" r="1.5"/>
    <circle cx="40" cy="200" r="1.5"/><circle cx="120" cy="200" r="1.5"/><circle cx="200" cy="200" r="1.5"/><circle cx="280" cy="200" r="1.5"/><circle cx="360" cy="200" r="1.5"/><circle cx="440" cy="200" r="1.5"/><circle cx="520" cy="200" r="1.5"/><circle cx="600" cy="200" r="1.5"/><circle cx="680" cy="200" r="1.5"/><circle cx="760" cy="200" r="1.5"/>
  </g>

  <!-- Floor -->
  <rect y="460" width="800" height="140" fill="url(#floor)"/>

  <!-- Electrical panel on wall -->
  <g transform="translate(500,140)">
    <rect width="220" height="280" rx="8" fill="url(#panel)" stroke="#0f172a" stroke-width="3"/>
    <rect x="14" y="14" width="192" height="252" rx="4" fill="#0f172a"/>
    <!-- breakers -->
    <g>
      <rect x="30" y="34" width="70" height="20" rx="3" fill="#facc15"/>
      <rect x="120" y="34" width="70" height="20" rx="3" fill="#facc15"/>
      <rect x="30" y="64" width="70" height="20" rx="3" fill="#3b82f6"/>
      <rect x="120" y="64" width="70" height="20" rx="3" fill="#3b82f6"/>
      <rect x="30" y="94" width="70" height="20" rx="3" fill="#facc15"/>
      <rect x="120" y="94" width="70" height="20" rx="3" fill="#facc15"/>
      <rect x="30" y="124" width="70" height="20" rx="3" fill="#3b82f6"/>
      <rect x="120" y="124" width="70" height="20" rx="3" fill="#3b82f6"/>
      <rect x="30" y="154" width="70" height="20" rx="3" fill="#facc15"/>
      <rect x="120" y="154" width="70" height="20" rx="3" fill="#facc15"/>
      <rect x="30" y="184" width="70" height="20" rx="3" fill="#3b82f6"/>
      <rect x="120" y="184" width="70" height="20" rx="3" fill="#3b82f6"/>
    </g>
  </g>

  <!-- Big lightning bolt accent -->
  <g transform="translate(120,120)" opacity="0.95">
    <path d="M170 0 L40 200 H110 L80 380 L260 140 H180 Z"
          fill="url(#boltY)"
          stroke="#0f172a"
          stroke-width="4"
          stroke-linejoin="round"/>
  </g>

  <!-- Wires -->
  <g fill="none" stroke-width="5" stroke-linecap="round">
    <path d="M0 480 C 200 440, 380 520, 800 470" stroke="#facc15" opacity="0.85"/>
    <path d="M0 510 C 220 470, 400 540, 800 500" stroke="#3b82f6" opacity="0.85"/>
  </g>

  <!-- Sparks -->
  <g fill="#facc15">
    <circle cx="630" cy="170" r="3"/>
    <circle cx="660" cy="200" r="2"/>
    <circle cx="690" cy="160" r="2.5"/>
    <circle cx="610" cy="220" r="2"/>
  </g>
</svg>
